version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    groups:
      composer:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
